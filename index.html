<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Melodify - តន្ត្រីខ្មែរ</title>
    <style>
        /* Modern CSS Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --heart: #e74c3c;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            z-index: 100;
            gap: 10px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--accent), #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .search-bar {
            flex: 1;
            min-width: 150px;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .admin-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .admin-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 90px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin: 12px 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .tab {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            transition: 0.3s;
            border: none;
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--accent);
        }

        /* Song List */
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            gap: 12px;
        }

        .song-item:hover, .song-item.active {
            background: var(--bg-tertiary);
            transform: scale(1.01);
        }

        .song-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--bg-tertiary);
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-title {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: 0.2s;
        }

        .btn-icon:hover {
            color: var(--text-primary);
            transform: scale(1.05);
        }

        .btn-icon.liked {
            color: var(--heart);
        }

        /* Now Playing Bar */
        .now-playing-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid #333;
            padding: 8px 12px;
            z-index: 200;
            box-shadow: var(--shadow);
        }

        .now-playing-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .np-cover {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
        }

        .np-info {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .np-title {
            font-size: 13px;
            font-weight: 600;
        }

        .np-artist {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .np-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .np-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: 0.2s;
        }

        .np-btn:hover {
            color: var(--accent);
        }

        .np-btn.play-btn {
            font-size: 24px;
        }

        .progress-container {
            width: 100%;
            margin-top: 6px;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Full Player */
        .full-player {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .full-player.show {
            display: flex;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-cover {
            width: 80%;
            max-width: 280px;
            aspect-ratio: 1;
            margin: 10px auto;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .player-info {
            text-align: center;
            margin: 16px 0;
        }

        .player-title {
            font-size: 20px;
            font-weight: bold;
        }

        .player-artist {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 20px 0;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
            transition: 0.2s;
        }

        .control-btn:hover {
            color: var(--accent);
            transform: scale(1.05);
        }

        .control-btn.play-pause {
            font-size: 44px;
            background: var(--accent);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn.play-pause:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.96);
            z-index: 400;
            display: none;
            padding: 20px;
            overflow-y: auto;
        }

        .admin-panel.show {
            display: block;
        }

        .admin-form {
            max-width: 550px;
            margin: 20px auto;
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
        }

        .admin-form h2, .admin-form h3 {
            margin-bottom: 16px;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .submit-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .github-token-section {
            margin: 20px 0;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .status-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            background: #1db95433;
            color: #1db954;
            display: block;
        }

        .status-message.error {
            background: #e74c3c33;
            color: #e74c3c;
            display: block;
        }

        .info-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .player-cover {
                width: 90%;
            }
            .control-btn.play-pause {
                width: 60px;
                height: 60px;
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">🎵 Melodify</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ស្វែងរកបទចម្រៀង..." oninput="searchSongs()">
            </div>
            <button class="admin-btn" onclick="showAdmin()">⚙️ Admin</button>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab active" onclick="switchTab('all', this)">ទាំងអស់</button>
            <button class="tab" onclick="switchTab('liked', this)">❤️ ចូលចិត្ត</button>
            <button class="tab" onclick="switchTab('history', this)">🕐 ប្រវត្តិ</button>
        </div>

        <div class="main-content" id="songList"></div>

        <!-- Now Playing Bar -->
        <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
            <div class="now-playing-content">
                <img class="np-cover" id="npCover" src="" alt="Cover" onclick="openFullPlayer()">
                <div class="np-info" onclick="openFullPlayer()">
                    <div class="np-title" id="npTitle"></div>
                    <div class="np-artist" id="npArtist"></div>
                </div>
                <div class="np-controls">
                    <button class="np-btn" onclick="previousSong()">⏮</button>
                    <button class="np-btn play-btn" id="npPlayPause" onclick="togglePlay()">▶️</button>
                    <button class="np-btn" onclick="nextSong()">⏭</button>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <!-- Full Player Modal -->
        <div class="full-player" id="fullPlayer">
            <div class="player-header">
                <button class="control-btn" onclick="closeFullPlayer()">▼ បិទ</button>
                <div></div>
                <button class="control-btn" onclick="shareCurrentSong()">📤 ចែករំលែក</button>
            </div>
            <img class="player-cover" id="playerCover" src="" alt="Cover">
            <div class="player-info">
                <div class="player-title" id="playerTitle"></div>
                <div class="player-artist" id="playerArtist"></div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="playerProgressBar" onclick="playerSeek(event)">
                    <div class="progress-fill" id="playerProgressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
                <button class="control-btn" onclick="previousSong()">⏮</button>
                <button class="control-btn play-pause" id="playerPlayPause" onclick="togglePlay()">▶️</button>
                <button class="control-btn" onclick="nextSong()">⏭</button>
                <button class="control-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <button class="control-btn" onclick="downloadCurrentSong()">⬇️ ទាញយក</button>
                <button class="control-btn" id="likeBtn" onclick="toggleLike()">🤍</button>
            </div>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-form">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>🔧 Admin Panel</h2>
                    <button class="btn-icon" onclick="closeAdmin()" style="font-size: 28px;">✕</button>
                </div>
                
                <div class="github-token-section">
                    <h3>🔑 GitHub Configuration (សមកាលកម្ម)</h3>
                    <div class="form-group">
                        <label>GitHub Token</label>
                        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                    </div>
                    <div class="form-group">
                        <label>GitHub Username</label>
                        <input type="text" id="githubUsername" placeholder="your-username">
                    </div>
                    <div class="form-group">
                        <label>Repository Name</label>
                        <input type="text" id="githubRepo" placeholder="khmer-music-lover">
                    </div>
                    <div class="info-text">
                        ⚠️ Token ត្រូវការសិទ្ធិ <strong>repo</strong> ។ អ្នកផ្សេងទៀតមិនចាំបាច់ Token ដើម្បីស្តាប់ទេ។
                    </div>
                </div>

                <div id="statusMessage" class="status-message"></div>
                
                <h3>➕ បញ្ចូលបទថ្មី</h3>
                <div class="form-group">
                    <label>ឈ្មោះបទ</label>
                    <input type="text" id="songTitle" placeholder="ឧ: ស្រីស្រី">
                </div>
                <div class="form-group">
                    <label>អ្នកចម្រៀង</label>
                    <input type="text" id="songArtist" placeholder="ឧ: ស៊ិន ស៊ីសាមុត">
                </div>
                <div class="form-group">
                    <label>អាល់ប៊ុម (ស្រេចចិត្ត)</label>
                    <input type="text" id="songAlbum" placeholder="ឈ្មោះអាល់ប៊ុម">
                </div>
                <div class="form-group">
                    <label>តំណ MP3 (URL)</label>
                    <input type="url" id="songUrl" placeholder="https://example.com/song.mp3">
                </div>
                <div class="form-group">
                    <label>តំណរូបភាព (URL)</label>
                    <input type="url" id="songCover" placeholder="https://example.com/cover.jpg">
                </div>
                <button class="submit-btn" onclick="addSong()">រក្សាទុក & សមកាលកម្ម GitHub</button>
                
                <h3 style="margin-top: 30px;">📋 បញ្ជីចម្រៀងក្នុងប្រព័ន្ធ</h3>
                <div id="adminSongList" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        // ---------- Global Variables ----------
        let songs = [];
        let currentSongIndex = -1;
        let isPlaying = false;
        let isShuffled = false;
        let repeatMode = 'off'; // 'off', 'all', 'one'
        let currentTab = 'all';
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs') || '[]');
        let historySongs = JSON.parse(localStorage.getItem('historySongs') || '[]');
        let playlist = [];

        const audioPlayer = document.getElementById('audioPlayer');
        
        // Default GitHub repo (public for reading)
        const DEFAULT_USERNAME = 'longkor086-afk';
        const DEFAULT_REPO = 'MelodifyKH';

        function getGitHubConfig() {
            const username = localStorage.getItem('githubUsername') || DEFAULT_USERNAME;
            const repo = localStorage.getItem('githubRepo') || DEFAULT_REPO;
            return { username, repo };
        }

        function getSongsJsonUrl() {
            const { username, repo } = getGitHubConfig();
            return `https://raw.githubusercontent.com/${username}/${repo}/main/songs.json?t=${Date.now()}`;
        }

        // ---------- Load Songs from GitHub (Public, no token needed) ----------
        async function loadSongs() {
            try {
                const url = getSongsJsonUrl();
                console.log("Loading from:", url);
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    songs = data;
                    localStorage.setItem('songs_cache', JSON.stringify(songs));
                    console.log(`✅ Loaded ${songs.length} songs from GitHub`);
                } else {
                    throw new Error("Empty or invalid data");
                }
            } catch (error) {
                console.warn("GitHub fetch failed, using cache/fallback:", error);
                const cached = localStorage.getItem('songs_cache');
                if (cached) {
                    songs = JSON.parse(cached);
                    console.log(`📦 Loaded ${songs.length} songs from cache`);
                } else {
                    // Fallback demo songs
                    songs = [
                        {
                            id: "demo1",
                            title: "ឧទាហរណ៍បទចម្រៀង",
                            artist: "វិចិត្រករខ្មែរ",
                            album: "ស្នេហ៍ខ្មែរ",
                            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                            cover: "https://via.placeholder.com/300/1db954/ffffff?text=Melodify",
                            addedDate: new Date().toISOString()
                        }
                    ];
                    localStorage.setItem('songs_cache', JSON.stringify(songs));
                }
            }
            
            updatePlaylist();
            renderSongs();
            updateAdminSongList();
        }

        // ---------- Helper: Update playlist based on tab ----------
        function updatePlaylist() {
            switch(currentTab) {
                case 'all':
                    playlist = [...songs];
                    break;
                case 'liked':
                    playlist = songs.filter(song => likedSongs.includes(song.id));
                    break;
                case 'history':
                    playlist = historySongs.map(id => songs.find(s => s.id === id)).filter(Boolean);
                    break;
                default:
                    playlist = [...songs];
            }
            
            if (isShuffled && currentTab === 'all') {
                shuffleArray(playlist);
            } else if (isShuffled && currentTab !== 'all') {
                shuffleArray(playlist);
            }
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // ---------- Render Songs UI ----------
        function renderSongs() {
            const container = document.getElementById('songList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = playlist.filter(song => 
                song.title.toLowerCase().includes(searchTerm) ||
                song.artist.toLowerCase().includes(searchTerm) ||
                (song.album && song.album.toLowerCase().includes(searchTerm))
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">🎵 រកមិនឃើញបទចម្រៀងទេ</div>';
                return;
            }

            container.innerHTML = filtered.map((song, idx) => {
                const originalIndex = songs.findIndex(s => s.id === song.id);
                const isActive = (currentSongIndex === originalIndex);
                const isLiked = likedSongs.includes(song.id);
                return `
                    <div class="song-item ${isActive ? 'active' : ''}" onclick="playSong(${originalIndex})">
                        <img class="song-cover" src="${song.cover || 'https://via.placeholder.com/48'}" alt="cover" onerror="this.src='https://via.placeholder.com/48'">
                        <div class="song-info">
                            <div class="song-title">${escapeHtml(song.title)}</div>
                            <div class="song-artist">${escapeHtml(song.artist)}${song.album ? ' • ' + escapeHtml(song.album) : ''}</div>
                        </div>
                        <div class="song-actions">
                            <button class="btn-icon ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLikeSong(${originalIndex})">
                                ${isLiked ? '❤️' : '🤍'}
                            </button>
                            <button class="btn-icon" onclick="event.stopPropagation(); shareSong(${originalIndex})">📤</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

        // ---------- Playback Controls ----------
        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            currentSongIndex = index;
            const song = songs[index];
            
            // add to history
            if (!historySongs.includes(song.id)) {
                historySongs.unshift(song.id);
                if (historySongs.length > 50) historySongs.pop();
                localStorage.setItem('historySongs', JSON.stringify(historySongs));
            }
            
            audioPlayer.src = song.url;
            audioPlayer.load();
            audioPlayer.play().then(() => {
                isPlaying = true;
                updatePlayPauseButtons();
            }).catch(err => {
                console.error("Play error:", err);
                alert("មិនអាចចាក់ MP3 បានទេ។ សូមពិនិត្យ URL ។");
                isPlaying = false;
                updatePlayPauseButtons();
            });
            
            updateNowPlaying();
            updateFullPlayer();
            renderSongs();
            document.getElementById('nowPlayingBar').style.display = 'block';
            
            // Media Session API
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: song.album,
                    artwork: [{ src: song.cover, sizes: "512x512" }]
                });
            }
        }

        function togglePlay() {
            if (currentSongIndex === -1) {
                if (songs.length) playSong(0);
                return;
            }
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                audioPlayer.play();
                isPlaying = true;
            }
            updatePlayPauseButtons();
        }

        function nextSong() {
            if (songs.length === 0) return;
            let nextIdx = -1;
            if (isShuffled && playlist.length > 0) {
                let currentPlaylistIdx = playlist.findIndex(s => s.id === songs[currentSongIndex]?.id);
                if (currentPlaylistIdx !== -1 && currentPlaylistIdx + 1 < playlist.length) {
                    let nextSongObj = playlist[currentPlaylistIdx + 1];
                    nextIdx = songs.findIndex(s => s.id === nextSongObj.id);
                } else {
                    nextIdx = songs.findIndex(s => s.id === playlist[0]?.id);
                }
            } else {
                nextIdx = currentSongIndex + 1;
                if (nextIdx >= songs.length) {
                    if (repeatMode === 'all') nextIdx = 0;
                    else return;
                }
            }
            if (nextIdx !== -1) playSong(nextIdx);
        }

        function previousSong() {
            if (songs.length === 0 || currentSongIndex === -1) return;
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }
            let prevIdx = currentSongIndex - 1;
            if (prevIdx < 0 && repeatMode === 'all') prevIdx = songs.length - 1;
            if (prevIdx >= 0) playSong(prevIdx);
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            const shuffleBtn = document.getElementById('shuffleBtn');
            if (shuffleBtn) shuffleBtn.classList.toggle('active', isShuffled);
            updatePlaylist();
            renderSongs();
        }

        function toggleRepeat() {
            const modes = ['off', 'all', 'one'];
            const idx = modes.indexOf(repeatMode);
            repeatMode = modes[(idx + 1) % 3];
            const repeatBtn = document.getElementById('repeatBtn');
            if (repeatBtn) {
                repeatBtn.textContent = repeatMode === 'one' ? '🔂' : '🔁';
                repeatBtn.classList.toggle('active', repeatMode !== 'off');
            }
        }

        function updatePlayPauseButtons() {
            const icon = isPlaying ? '⏸️' : '▶️';
            const npBtn = document.getElementById('npPlayPause');
            const fullBtn = document.getElementById('playerPlayPause');
            if (npBtn) npBtn.textContent = icon;
            if (fullBtn) fullBtn.textContent = icon;
        }

        function updateNowPlaying() {
            if (currentSongIndex === -1) return;
            const s = songs[currentSongIndex];
            document.getElementById('npCover').src = s.cover || 'https://via.placeholder.com/48';
            document.getElementById('npTitle').innerText = s.title;
            document.getElementById('npArtist').innerText = s.artist;
        }

        function updateFullPlayer() {
            if (currentSongIndex === -1) return;
            const s = songs[currentSongIndex];
            document.getElementById('playerCover').src = s.cover || 'https://via.placeholder.com/300';
            document.getElementById('playerTitle').innerText = s.title;
            document.getElementById('playerArtist').innerText = s.artist;
            const likeBtn = document.getElementById('likeBtn');
            if (likeBtn) likeBtn.textContent = likedSongs.includes(s.id) ? '❤️' : '🤍';
        }

        function toggleLike() {
            if (currentSongIndex !== -1) toggleLikeSong(currentSongIndex);
        }

        function toggleLikeSong(index) {
            const song = songs[index];
            const idx = likedSongs.indexOf(song.id);
            if (idx > -1) likedSongs.splice(idx, 1);
            else likedSongs.push(song.id);
            localStorage.setItem('likedSongs', JSON.stringify(likedSongs));
            renderSongs();
            if (currentSongIndex === index) updateFullPlayer();
        }

        function seek(e) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audioPlayer.duration) audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        function playerSeek(e) {
            const bar = document.getElementById('playerProgressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audioPlayer.duration) audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        // UI Helpers
        function openFullPlayer() { document.getElementById('fullPlayer').classList.add('show'); }
        function closeFullPlayer() { document.getElementById('fullPlayer').classList.remove('show'); }
        function showNowPlayingBar() { document.getElementById('nowPlayingBar').style.display = 'block'; }
        
        function switchTab(tab, btnElement) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            updatePlaylist();
            renderSongs();
        }
        
        function searchSongs() { updatePlaylist(); renderSongs(); }

        // Admin functions
        function showAdmin() {
            const pwd = prompt("បញ្ចូលពាក្យសម្ងាត់ Admin:");
            if (pwd === 'admin123') {
                document.getElementById('adminPanel').classList.add('show');
                const token = localStorage.getItem('githubToken');
                const uname = localStorage.getItem('githubUsername');
                const repo = localStorage.getItem('githubRepo');
                if (token) document.getElementById('githubToken').value = token;
                if (uname) document.getElementById('githubUsername').value = uname;
                if (repo) document.getElementById('githubRepo').value = repo;
            } else if (pwd !== null) alert('ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!');
        }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('show'); }
        
        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = 'status-message ' + type;
            setTimeout(() => { el.className = 'status-message'; }, 5000);
        }

        async function updateGitHubSongs(token, username, repo) {
            if (!token || !username || !repo) throw new Error("Missing GitHub info");
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(songs, null, 2))));
            const url = `https://api.github.com/repos/${username}/${repo}/contents/songs.json`;
            let sha = null;
            // get current file if exists
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (getRes.ok) {
                const file = await getRes.json();
                sha = file.sha;
            }
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Update songs from Melodify', content, sha })
            });
            if (!putRes.ok) throw new Error("GitHub update failed");
            return true;
        }

        async function addSong() {
            const title = document.getElementById('songTitle').value.trim();
            const artist = document.getElementById('songArtist').value.trim();
            const album = document.getElementById('songAlbum').value.trim();
            const url = document.getElementById('songUrl').value.trim();
            const cover = document.getElementById('songCover').value.trim();
            const token = document.getElementById('githubToken').value.trim();
            const username = document.getElementById('githubUsername').value.trim();
            const repo = document.getElementById('githubRepo').value.trim();

            if (!title || !artist || !url) { alert("សូមបំពេញឈ្មោះបទ, អ្នកចម្រៀង និង URL"); return; }
            if (!token || !username || !repo) { alert("សូមបញ្ចូល GitHub Token, Username និង Repo"); return; }

            localStorage.setItem('githubToken', token);
            localStorage.setItem('githubUsername', username);
            localStorage.setItem('githubRepo', repo);

            const newSong = {
                id: Date.now().toString(),
                title,
                artist,
                album: album || "Unknown",
                url,
                cover: cover || "https://via.placeholder.com/300",
                addedDate: new Date().toISOString()
            };
            songs.push(newSong);
            showStatus("⏳ កំពុងសមកាលកម្មទៅ GitHub...", "success");
            try {
                await updateGitHubSongs(token, username, repo);
                showStatus("✅ បានបន្ថែម និងធ្វើបច្ចុប្បន្នភាព GitHub ដោយជោគជ័យ!", "success");
                localStorage.setItem('songs_cache', JSON.stringify(songs));
                updatePlaylist();
                renderSongs();
                updateAdminSongList();
                document.getElementById('songTitle').value = '';
                document.getElementById('songArtist').value = '';
                document.getElementById('songAlbum').value = '';
                document.getElementById('songUrl').value = '';
                document.getElementById('songCover').value = '';
            } catch (err) {
                showStatus("❌ បរាជ័យ: " + err.message, "error");
                localStorage.setItem('songs_backup', JSON.stringify(songs));
            }
        }

        async function deleteSong(index) {
            if (!confirm("លុបបទនេះចេញជាអចិន្ត្រៃ?")) return;
            songs.splice(index, 1);
            const token = document.getElementById('githubToken').value.trim();
            const uname = document.getElementById('githubUsername').value.trim();
            const repo = document.getElementById('githubRepo').value.trim();
            if (token && uname && repo) {
                try {
                    await updateGitHubSongs(token, uname, repo);
                    showStatus("លុបដោយជោគជ័យ!", "success");
                } catch(e) { showStatus("លុបក្នុងមូលដ្ឋានតែប៉ុណ្ណោះ", "error"); }
            }
            localStorage.setItem('songs_cache', JSON.stringify(songs));
            updatePlaylist();
            renderSongs();
            updateAdminSongList();
            if (currentSongIndex === index) { audioPlayer.pause(); isPlaying = false; currentSongIndex = -1; updatePlayPauseButtons(); }
        }

        function updateAdminSongList() {
            const container = document.getElementById('adminSongList');
            if (!songs.length) { container.innerHTML = '<div style="padding:20px;">មិនទាន់មានបទចម្រៀង</div>'; return; }
            container.innerHTML = songs.map((s, i) => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #444;">
                    <div style="flex:1;"><strong>${escapeHtml(s.title)}</strong><br><small>${escapeHtml(s.artist)}</small></div>
                    <button class="delete-btn" onclick="deleteSong(${i})">លុប</button>
                </div>
            `).join('');
        }

        function downloadCurrentSong() {
            if (currentSongIndex !== -1) {
                const s = songs[currentSongIndex];
                const a = document.createElement('a');
                a.href = s.url;
                a.download = `${s.title}.mp3`;
                a.click();
            }
        }
        function shareCurrentSong() { if (currentSongIndex !== -1) shareSong(currentSongIndex); }
        function shareSong(idx) {
            const s = songs[idx];
            if (navigator.share) navigator.share({ title: s.title, text: `ស្តាប់ ${s.title} ដោយ ${s.artist}`, url: window.location.href });
            else { navigator.clipboard.writeText(window.location.href); alert("ចម្លងតំណរួចរាល់!"); }
        }

        // Audio Event Listeners
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('playerProgressFill').style.width = percent + '%';
                document.getElementById('currentTime').innerText = formatTime(audioPlayer.currentTime);
                document.getElementById('duration').innerText = formatTime(audioPlayer.duration);
            }
        });
        audioPlayer.addEventListener('ended', () => {
            if (repeatMode === 'one') { audioPlayer.currentTime = 0; audioPlayer.play(); }
            else nextSong();
        });
        function formatTime(sec) { if (!sec) return "0:00"; const m = Math.floor(sec/60); const s = Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }

        // Media Session Handlers
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => togglePlay());
            navigator.mediaSession.setActionHandler('pause', () => togglePlay());
            navigator.mediaSession.setActionHandler('previoustrack', () => previousSong());
            navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
        }

        // Initialize App
        loadSongs();
    </script>
</body>
</html>
