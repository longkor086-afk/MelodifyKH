<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelodifyKH - តន្ត្រីខ្មែរ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #0a84ff;
            --accent-red: #ff375f;
            --accent-green: #30d158;
            --accent-orange: #ff9f0a;
            --border: #38383a;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: 12px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .song-count {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tab:hover {
            opacity: 0.8;
        }

        /* Song Grid */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .song-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .song-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .song-card-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--text-secondary);
            position: relative;
        }

        .song-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .delete-overlay {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--accent-red);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
            border: 2px solid white;
            transition: all 0.2s;
        }

        .delete-overlay:hover {
            transform: scale(1.1);
            background: #ff1744;
        }

        .song-card.admin-mode .delete-overlay {
            display: flex;
        }

        .song-card-body {
            padding: 12px;
        }

        .song-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .song-card-btn {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .song-card-btn:hover {
            background: var(--accent);
        }

        .song-card-btn.liked {
            background: var(--accent-red);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pagination button:hover {
            opacity: 0.8;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Now Playing Bar */
        .now-playing-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 200;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .now-playing-info {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .now-playing-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-artist {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .now-playing-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: var(--bg-tertiary);
        }

        .control-btn.play-btn {
            font-size: 28px;
            color: var(--accent);
        }

        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
            margin-top: 4px;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.1s;
            width: 0%;
        }

        /* Full Player Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 300;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-tertiary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-art {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            background: var(--bg-tertiary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: var(--text-secondary);
            overflow: hidden;
        }

        .modal-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }

        .modal-artist {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-progress {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .modal-progress .progress-bar-container {
            height: 6px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .modal-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .modal-controls .control-btn {
            font-size: 28px;
        }

        .modal-controls .play-btn {
            font-size: 48px;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            z-index: 400;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .admin-panel.active {
            display: block;
        }

        .admin-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 350;
        }

        .admin-overlay.active {
            display: block;
        }

        .admin-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .admin-section {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
        }

        .admin-section h4 {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* Song List in Admin */
        .admin-song-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .admin-song-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }

        .admin-song-item:hover {
            background: var(--bg-secondary);
        }

        .admin-song-info {
            flex: 1;
            min-width: 0;
            margin-right: 12px;
        }

        .admin-song-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-song-artist {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .admin-song-actions {
            display: flex;
            gap: 6px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .upload-queue {
            margin-top: 16px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .upload-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .upload-item:last-child {
            border-bottom: none;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.success { background: var(--accent-green); }
        .status-dot.pending { background: #ffcc00; }
        .status-dot.error { background: var(--accent-red); }

        /* Confirm Dialog */
        .confirm-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            z-index: 500;
            text-align: center;
            border: 1px solid var(--border);
            max-width: 400px;
            width: 90%;
        }

        .confirm-dialog.active {
            display: block;
        }

        .confirm-dialog h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .confirm-dialog .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-green);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 600;
            display: none;
            animation: slideIn 0.3s ease;
            max-width: 350px;
            word-wrap: break-word;
        }

        .toast.error {
            background: var(--accent-red);
        }

        .toast.warning {
            background: var(--accent-orange);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .song-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }

            .header-content {
                flex-wrap: wrap;
            }

            .search-bar {
                max-width: 100%;
                order: 3;
                flex: 100%;
            }

            .modal-art {
                width: 220px;
                height: 220px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo" onclick="location.reload()">🎵 MelodifyKH</div>
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="ស្វែងរកបទចម្រៀង ឬអ្នកចម្រៀង..." oninput="filterSongs()">
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="toggleShuffle()" id="shuffleBtn" title="Shuffle">🔀</button>
                <button class="btn btn-secondary" onclick="toggleRepeat()" id="repeatBtn" title="Repeat">🔁</button>
                <button class="btn btn-secondary" id="adminModeToggle" onclick="toggleAdminMode()" title="Admin Mode" style="display:none;">👑</button>
                <button class="btn btn-secondary" onclick="openAdmin()">⚙️ គ្រប់គ្រង</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('all')">ទាំងអស់</button>
            <button class="tab" onclick="switchTab('liked')">❤️ ចូលចិត្ត</button>
            <button class="tab" onclick="switchTab('history')">🕐 ប្រវត្តិ</button>
            <button class="tab" onclick="switchTab('queue')">📋 ជួរចាក់</button>
        </div>

        <h2 class="section-title" id="sectionTitle">
            បទចម្រៀងទាំងអស់
            <span class="song-count" id="songCount"></span>
        </h2>

        <div class="song-grid" id="songGrid"></div>

        <div class="pagination" id="pagination"></div>
    </main>

    <!-- Now Playing Bar -->
    <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
        <div class="now-playing-info" onclick="openFullPlayer()">
            <div class="now-playing-title" id="nowPlayingTitle">-</div>
            <div class="now-playing-artist" id="nowPlayingArtist">-</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        <div class="now-playing-controls">
            <button class="control-btn" onclick="playPrevious()">⏮️</button>
            <button class="control-btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶️</button>
            <button class="control-btn" onclick="playNext()">⏭️</button>
        </div>
    </div>

    <!-- Full Player Modal -->
    <div class="modal" id="fullPlayerModal">
        <button class="modal-close" onclick="closeFullPlayer()">✕</button>
        <div class="modal-art" id="modalArt">🎵</div>
        <div class="modal-title" id="modalTitle">-</div>
        <div class="modal-artist" id="modalArtist">-</div>
        <div class="modal-progress">
            <div class="progress-bar-container" onclick="seekAudio(event)">
                <div class="progress-bar" id="modalProgressBar"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="modal-controls">
            <button class="control-btn" onclick="toggleShuffle()">🔀</button>
            <button class="control-btn" onclick="playPrevious()">⏮️</button>
            <button class="control-btn play-btn" id="modalPlayBtn" onclick="togglePlay()">▶️</button>
            <button class="control-btn" onclick="playNext()">⏭️</button>
            <button class="control-btn" onclick="toggleRepeat()">🔁</button>
        </div>
    </div>

    <!-- Confirm Delete Dialog -->
    <div class="confirm-dialog" id="confirmDialog">
        <h3>⚠️ បញ្ជាក់ការលុប</h3>
        <p id="confirmMessage">តើអ្នកប្រាកដថាចង់លុបបទនេះទេ?</p>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeConfirmDialog()">បោះបង់</button>
            <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">លុប</button>
        </div>
    </div>

    <!-- Admin Overlay -->
    <div class="admin-overlay" id="adminOverlay" onclick="closeAdmin()"></div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <h3 class="admin-title">⚙️ Admin Panel</h3>
        
        <!-- GitHub Config -->
        <div class="admin-section">
            <h4>🔧 កំណត់ GitHub</h4>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubToken" placeholder="ghp_...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>GitHub Username</label>
                    <input type="text" id="githubUsername" placeholder="longkor086-afk">
                </div>
                <div class="form-group">
                    <label>GitHub Repo</label>
                    <input type="text" id="githubRepo" placeholder="MelodifyKH">
                </div>
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="បញ្ចូលពាក្យសម្ងាត់">
            </div>
            <button class="btn btn-primary" onclick="loginAdmin()" style="width:100%;">ចូល Admin</button>
        </div>

        <!-- Admin Content (shown after login) -->
        <div id="adminContent" style="display:none;">
            <!-- Add Song -->
            <div class="admin-section">
                <h4>➕ បន្ថែមបទថ្មី</h4>
                <div class="form-group">
                    <label>ឈ្មោះបទ</label>
                    <input type="text" id="newSongTitle" placeholder="ចំណងជើងបទ">
                </div>
                <div class="form-group">
                    <label>អ្នកចម្រៀង</label>
                    <input type="text" id="newSongArtist" placeholder="ឈ្មោះអ្នកចម្រៀង">
                </div>
                <div class="form-group">
                    <label>MP3 URL (Telegram Direct Link)</label>
                    <input type="text" id="newSongUrl" placeholder="https://api.telegram.org/file/...">
                </div>
                <div class="form-group">
                    <label>Cover Image URL (Telegram Direct Link)</label>
                    <input type="text" id="newSongCover" placeholder="https://api.telegram.org/file/...">
                </div>
                <button class="btn btn-primary" onclick="addSongManual()" style="width:100%;">រក្សាទុកបទ</button>
            </div>

            <!-- Delete Songs -->
            <div class="admin-section">
                <h4>🗑️ លុបចម្រៀង</h4>
                <div class="search-bar" style="margin-bottom:12px;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="adminSearchInput" placeholder="ស្វែងរកបទដើម្បីលុប..." oninput="filterAdminSongs()">
                </div>
                <div class="admin-song-list" id="adminSongList">
                    <div style="color: var(--text-secondary); font-size: 13px; text-align:center; padding:20px;">កំពុងផ្ទុក...</div>
                </div>
                <div style="margin-top:12px; font-size:12px; color: var(--text-secondary);">
                    សរុប៖ <span id="adminTotalSongs">0</span> បទ
                </div>
            </div>

            <!-- Upload Queue -->
            <div class="admin-section">
                <h4>📤 ប្រវត្តិ Upload</h4>
                <div class="upload-queue" id="uploadQueue">
                    <div style="color: var(--text-secondary); font-size: 13px;">មិនទាន់មានការបញ្ចូល</div>
                </div>
            </div>

            <!-- Bulk Actions -->
            <div class="admin-section">
                <h4>⚡ សកម្មភាពរហ័ស</h4>
                <button class="btn btn-danger" onclick="deleteAllSongs()" style="width:100%;">🗑️ លុបបទទាំងអស់</button>
                <button class="btn btn-secondary" onclick="refreshSongs()" style="width:100%; margin-top:8px;">🔄 ផ្ទុកទិន្នន័យឡើងវិញ</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Hidden Audio Element -->
    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
        // ==================== GLOBAL STATE ====================
        const GITHUB_API = 'https://api.github.com';
        const SONGS_PATH = 'songs.json';
        const ITEMS_PER_PAGE = 20;

        let allSongs = [];
        let currentTab = 'all';
        let currentPage = 1;
        let currentSongIndex = -1;
        let queue = [];
        let isShuffle = false;
        let isRepeat = false;
        let isAdminLoggedIn = false;
        let isAdminMode = false;
        let songToDelete = null;
        let githubConfig = {
            token: '',
            username: '',
            repo: ''
        };

        // ==================== INITIALIZATION ====================
        async function init() {
            loadFromStorage();
            await loadSongs();
            renderAll();
            setupAudioEvents();
            updateAdminModeButton();
        }

        function loadFromStorage() {
            // Load liked songs
            const liked = localStorage.getItem('melodify_liked');
            if (!liked) localStorage.setItem('melodify_liked', JSON.stringify([]));

            // Load history
            const history = localStorage.getItem('melodify_history');
            if (!history) localStorage.setItem('melodify_history', JSON.stringify([]));

            // Load github config
            const config = localStorage.getItem('melodify_github_config');
            if (config) {
                try {
                    githubConfig = JSON.parse(config);
                    document.getElementById('githubToken').value = githubConfig.token || '';
                    document.getElementById('githubUsername').value = githubConfig.username || '';
                    document.getElementById('githubRepo').value = githubConfig.repo || '';
                } catch (e) {
                    console.log('Error parsing github config');
                }
            }

            // Load admin logged in state
            isAdminLoggedIn = localStorage.getItem('melodify_admin_logged_in') === 'true';
            if (isAdminLoggedIn) {
                document.getElementById('adminContent').style.display = 'block';
            }
        }

        async function loadSongs() {
            try {
                // Try to load from GitHub first
                if (githubConfig.token && githubConfig.username && githubConfig.repo) {
                    const url = `${GITHUB_API}/repos/${githubConfig.username}/${githubConfig.repo}/contents/${SONGS_PATH}`;
                    const response = await fetch(url, {
                        headers: {
                            'Authorization': `token ${githubConfig.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const content = atob(data.content);
                        allSongs = JSON.parse(content);
                        console.log('Loaded from GitHub:', allSongs.length, 'songs');
                        return;
                    }
                }
            } catch (e) {
                console.log('Could not load from GitHub, trying local:', e);
            }

            // Fallback to local songs.json
            try {
                const response = await fetch('songs.json');
                if (response.ok) {
                    allSongs = await response.json();
                }
            } catch (e) {
                console.log('No local songs.json found');
                allSongs = [];
            }
        }

        async function saveSongsToGitHub() {
            if (!githubConfig.token || !githubConfig.username || !githubConfig.repo) {
                showToast('⚠️ សូមកំណត់ GitHub Config ជាមុន', 'warning');
                return false;
            }

            try {
                const url = `${GITHUB_API}/repos/${githubConfig.username}/${githubConfig.repo}/contents/${SONGS_PATH}`;
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(allSongs, null, 2))));

                // Get current file SHA
                let sha = '';
                try {
                    const getResponse = await fetch(url, {
                        headers: {
                            'Authorization': `token ${githubConfig.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    if (getResponse.ok) {
                        const data = await getResponse.json();
                        sha = data.sha;
                    }
                } catch (e) {}

                const body = {
                    message: 'Update songs.json',
                    content: content,
                    branch: 'main'
                };
                if (sha) body.sha = sha;

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    showToast('✅ រក្សាទុកទៅ GitHub បានសម្រេច');
                    return true;
                } else {
                    const err = await response.json();
                    showToast('❌ មិនអាចរក្សាទុក: ' + (err.message || 'Unknown error'), 'error');
                    return false;
                }
            } catch (e) {
                showToast('❌ មានបញ្ហា: ' + e.message, 'error');
                return false;
            }
        }

        // ==================== RENDER ====================
        function getFilteredSongs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let songs = [...allSongs];

            // Filter by tab
            if (currentTab === 'liked') {
                const liked = JSON.parse(localStorage.getItem('melodify_liked') || '[]');
                songs = songs.filter(s => liked.includes(s.id || s.title));
            } else if (currentTab === 'history') {
                const history = JSON.parse(localStorage.getItem('melodify_history') || '[]');
                songs = songs.filter(s => history.includes(s.id || s.title));
            } else if (currentTab === 'queue') {
                return queue.map(id => findSongById(id)).filter(s => s);
            }

            // Filter by search
            if (searchTerm) {
                songs = songs.filter(s =>
                    (s.title || '').toLowerCase().includes(searchTerm) ||
                    (s.artist || '').toLowerCase().includes(searchTerm)
                );
            }

            return songs;
        }

        function renderAll() {
            renderSongs();
            renderPagination();
            updateNowPlayingBar();
            updateSongCount();
        }

        function renderSongs() {
            const grid = document.getElementById('songGrid');
            const filtered = getFilteredSongs();
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageSongs = filtered.slice(start, start + ITEMS_PER_PAGE);
            const liked = JSON.parse(localStorage.getItem('melodify_liked') || '[]');

            if (pageSongs.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color: var(--text-secondary);">គ្មានបទចម្រៀង</div>';
                return;
            }

            grid.innerHTML = pageSongs.map(song => {
                const songId = song.id || song.title;
                const isLiked = liked.includes(songId);
                const adminClass = isAdminMode ? ' admin-mode' : '';
                return `
                    <div class="song-card${adminClass}" id="card-${escapeHtml(songId)}">
                        <div class="delete-overlay" onclick="event.stopPropagation(); requestDeleteSong('${escapeHtml(songId)}')" title="លុបបទនេះ">🗑️</div>
                        <div class="song-card-image" onclick="playSongById('${escapeHtml(songId)}')">
                            ${song.cover ? `<img src="${escapeHtml(song.cover)}" alt="${escapeHtml(song.title)}" onerror="this.style.display='none';this.parentElement.textContent='🎵';">` : '🎵'}
                        </div>
                        <div class="song-card-body" onclick="playSongById('${escapeHtml(songId)}')">
                            <div class="song-card-title">${escapeHtml(song.title || 'Unknown')}</div>
                            <div class="song-card-artist">${escapeHtml(song.artist || 'Unknown')}</div>
                        </div>
                        <div class="song-card-actions">
                            <button class="song-card-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${escapeHtml(songId)}')">
                                ${isLiked ? '❤️' : '🤍'}
                            </button>
                            <button class="song-card-btn" onclick="event.stopPropagation(); addToQueue('${escapeHtml(songId)}')">📋</button>
                            <button class="song-card-btn" onclick="event.stopPropagation(); downloadSong('${escapeHtml(songId)}')">⬇️</button>
                            <button class="song-card-btn" onclick="event.stopPropagation(); shareSong('${escapeHtml(songId)}')">🔗</button>
                            ${isAdminMode ? `<button class="song-card-btn" style="background:var(--accent-red);" onclick="event.stopPropagation(); requestDeleteSong('${escapeHtml(songId)}')">🗑️</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPagination() {
            const filtered = getFilteredSongs();
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            const container = document.getElementById('pagination');

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">◀</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (totalPages <= 7 || i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === 2 && currentPage > 4) {
                    html += '<button disabled>...</button>';
                } else if (i === totalPages - 1 && currentPage < totalPages - 3) {
                    html += '<button disabled>...</button>';
                }
            }

            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">▶</button>`;
            container.innerHTML = html;
        }

        function updateSongCount() {
            const filtered = getFilteredSongs();
            document.getElementById('songCount').textContent = `(${filtered.length} បទ)`;
        }

        function goToPage(page) {
            const filtered = getFilteredSongs();
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            const titles = {
                'all': 'បទចម្រៀងទាំងអស់',
                'liked': '❤️ បទដែលចូលចិត្ត',
                'history': '🕐 ប្រវត្តិស្តាប់',
                'queue': '📋 ជួរចាក់'
            };
            document.getElementById('sectionTitle').childNodes[0].textContent = titles[tab] || '';
            renderAll();
        }

        function filterSongs() {
            currentPage = 1;
            renderAll();
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== AUDIO PLAYBACK ====================
        const audio = document.getElementById('audioPlayer');

        function setupAudioEvents() {
            audio.addEventListener('timeupdate', () => {
                const progress = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('modalProgressBar').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            });

            audio.addEventListener('loadedmetadata', () => {
                document.getElementById('duration').textContent = formatTime(audio.duration);
            });

            audio.addEventListener('ended', () => {
                if (isRepeat) {
                    audio.currentTime = 0;
                    audio.play();
                } else {
                    playNext();
                }
            });

            audio.addEventListener('play', () => {
                document.getElementById('playPauseBtn').textContent = '⏸️';
                document.getElementById('modalPlayBtn').textContent = '⏸️';
            });

            audio.addEventListener('pause', () => {
                document.getElementById('playPauseBtn').textContent = '▶️';
                document.getElementById('modalPlayBtn').textContent = '▶️';
            });

            audio.addEventListener('error', () => {
                showToast('❌ មិនអាចចាក់បទនេះបាន', 'error');
            });
        }

        function findSongById(id) {
            return allSongs.find(s => (s.id || s.title) === id);
        }

        function playSongById(id) {
            const song = findSongById(id);
            if (!song) return;

            const index = allSongs.indexOf(song);
            currentSongIndex = index;
            playSong(song);
            addToHistory(id);
        }

        function playSong(song) {
            if (!song || !song.url) {
                showToast('❌ បទនេះគ្មាន URL', 'error');
                return;
            }

            audio.src = song.url;
            audio.play().catch(e => {
                console.log('Play error:', e);
                showToast('❌ មិនអាចចាក់បទនេះបាន សូមព្យាយាមម្តងទៀត', 'error');
            });

            updateNowPlayingBar();
            document.getElementById('nowPlayingBar').style.display = 'flex';

            // Update full player
            document.getElementById('modalTitle').textContent = song.title || 'Unknown';
            document.getElementById('modalArtist').textContent = song.artist || 'Unknown';
            
            // Update modal art
            const modalArt = document.getElementById('modalArt');
            if (song.cover) {
                modalArt.innerHTML = `<img src="${escapeHtml(song.cover)}" alt="${escapeHtml(song.title)}" onerror="this.parentElement.innerHTML='🎵';">`;
            } else {
                modalArt.innerHTML = '🎵';
            }
        }

        function updateNowPlayingBar() {
            if (currentSongIndex >= 0 && currentSongIndex < allSongs.length) {
                const song = allSongs[currentSongIndex];
                document.getElementById('nowPlayingTitle').textContent = song.title || 'Unknown';
                document.getElementById('nowPlayingArtist').textContent = song.artist || 'Unknown';
                document.getElementById('nowPlayingBar').style.display = 'flex';
            }
        }

        function togglePlay() {
            if (!audio.src && allSongs.length > 0) {
                playSongById(allSongs[0].id || allSongs[0].title);
                return;
            }
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        function playNext() {
            if (queue.length > 0) {
                const nextId = queue.shift();
                const song = findSongById(nextId);
                if (song) {
                    currentSongIndex = allSongs.indexOf(song);
                    playSong(song);
                }
                if (currentTab === 'queue') renderAll();
                return;
            }

            if (currentSongIndex < 0 || allSongs.length === 0) return;

            let nextIndex;
            if (isShuffle) {
                nextIndex = Math.floor(Math.random() * allSongs.length);
                while (nextIndex === currentSongIndex && allSongs.length > 1) {
                    nextIndex = Math.floor(Math.random() * allSongs.length);
                }
            } else {
                nextIndex = (currentSongIndex + 1) % allSongs.length;
            }

            currentSongIndex = nextIndex;
            playSong(allSongs[currentSongIndex]);
        }

        function playPrevious() {
            if (currentSongIndex < 0 || allSongs.length === 0) return;
            const prevIndex = (currentSongIndex - 1 + allSongs.length) % allSongs.length;
            currentSongIndex = prevIndex;
            playSong(allSongs[currentSongIndex]);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').style.background = isShuffle ? 'var(--accent)' : 'var(--bg-tertiary)';
            document.getElementById('shuffleBtn').style.color = isShuffle ? 'white' : 'var(--text-primary)';
            showToast(isShuffle ? '🔀 Shuffle បើក' : '🔀 Shuffle បិទ');
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').style.background = isRepeat ? 'var(--accent)' : 'var(--bg-tertiary)';
            document.getElementById('repeatBtn').style.color = isRepeat ? 'white' : 'var(--text-primary)';
            showToast(isRepeat ? '🔁 Repeat បើក' : '🔁 Repeat បិទ');
        }

        function seekAudio(event) {
            const container = event.currentTarget;
            const rect = container.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ==================== FULL PLAYER ====================
        function openFullPlayer() {
            document.getElementById('fullPlayerModal').classList.add('active');
        }

        function closeFullPlayer() {
            document.getElementById('fullPlayerModal').classList.remove('active');
        }

        // ==================== LIKES, HISTORY, QUEUE ====================
        function toggleLike(id) {
            const liked = JSON.parse(localStorage.getItem('melodify_liked') || '[]');
            const index = liked.indexOf(id);
            if (index > -1) {
                liked.splice(index, 1);
            } else {
                liked.push(id);
            }
            localStorage.setItem('melodify_liked', JSON.stringify(liked));
            renderSongs();
        }

        function addToHistory(id) {
            const history = JSON.parse(localStorage.getItem('melodify_history') || '[]');
            const index = history.indexOf(id);
            if (index > -1) history.splice(index, 1);
            history.unshift(id);
            if (history.length > 100) history.pop();
            localStorage.setItem('melodify_history', JSON.stringify(history));
        }

        function addToQueue(id) {
            queue.push(id);
            showToast('✅ បានបន្ថែមទៅជួរចាក់');
        }

        // ==================== DOWNLOAD & SHARE ====================
        function downloadSong(id) {
            const song = findSongById(id);
            if (!song || !song.url) {
                showToast('❌ គ្មាន URL សម្រាប់ទាញយក', 'error');
                return;
            }
            const a = document.createElement('a');
            a.href = song.url;
            a.download = `${song.title || 'song'}.mp3`;
            a.target = '_blank';
            a.rel = 'noopener';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('⬇️ កំពុងទាញយក...');
        }

        function shareSong(id) {
            const song = findSongById(id);
            if (!song) return;
            const text = `🎵 ${song.title} - ${song.artist}\nស្តាប់នៅ MelodifyKH`;
            if (navigator.share) {
                navigator.share({ title: song.title, text: text, url: window.location.href }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📋 បានចម្លងទៅ Clipboard');
                });
            }
        }

        // ==================== DELETE FUNCTIONALITY ====================
        function requestDeleteSong(id) {
            const song = findSongById(id);
            if (!song) return;
            songToDelete = song;
            document.getElementById('confirmMessage').textContent = `តើអ្នកប្រាកដថាចង់លុប "${song.title} - ${song.artist}" ទេ?`;
            document.getElementById('confirmDialog').classList.add('active');
            document.getElementById('adminOverlay').classList.add('active');
        }

        function closeConfirmDialog() {
            document.getElementById('confirmDialog').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
            songToDelete = null;
        }

        async function confirmDelete() {
            if (!songToDelete) return;
            
            const songId = songToDelete.id || songToDelete.title;
            allSongs = allSongs.filter(s => (s.id || s.title) !== songId);
            
            // Also remove from queue if present
            queue = queue.filter(id => id !== songId);
            
            // Also remove from liked if present
            const liked = JSON.parse(localStorage.getItem('melodify_liked') || '[]');
            const likedIndex = liked.indexOf(songId);
            if (likedIndex > -1) {
                liked.splice(likedIndex, 1);
                localStorage.setItem('melodify_liked', JSON.stringify(liked));
            }
            
            // Also remove from history if present
            const history = JSON.parse(localStorage.getItem('melodify_history') || '[]');
            const historyIndex = history.indexOf(songId);
            if (historyIndex > -1) {
                history.splice(historyIndex, 1);
                localStorage.setItem('melodify_history', JSON.stringify(history));
            }
            
            const saved = await saveSongsToGitHub();
            
            closeConfirmDialog();
            
            if (saved) {
                showToast('🗑️ បានលុបបទចម្រៀងដោយជោគជ័យ');
                
                // If currently playing this song, stop
                if (currentSongIndex >= allSongs.length) {
                    currentSongIndex = Math.max(0, allSongs.length - 1);
                    if (allSongs.length > 0) {
                        playSong(allSongs[currentSongIndex]);
                    } else {
                        audio.pause();
                        audio.src = '';
                        document.getElementById('nowPlayingBar').style.display = 'none';
                    }
                }
                
                renderAll();
                if (isAdminLoggedIn) {
                    renderAdminSongList();
                }
            } else {
                showToast('❌ មិនអាចលុបបទបាន សូមព្យាយាមម្តងទៀត', 'error');
            }
        }

        async function deleteAllSongs() {
            if (allSongs.length === 0) {
                showToast('⚠️ គ្មានបទចម្រៀងសម្រាប់លុប', 'warning');
                return;
            }
            
            songToDelete = { id: '__ALL__', title: 'បទទាំងអស់', artist: `${allSongs.length} បទ` };
            document.getElementById('confirmMessage').textContent = `⚠️ តើអ្នកប្រាកដថាចង់លុបបទទាំង ${allSongs.length} ទេ? សកម្មភាពនេះមិនអាចត្រឡប់ក្រោយបានទេ!`;
            document.getElementById('confirmDialog').classList.add('active');
            document.getElementById('adminOverlay').classList.add('active');
            
            // Override confirm delete for bulk
            const originalConfirm = document.getElementById('confirmDeleteBtn').onclick;
            document.getElementById('confirmDeleteBtn').onclick = async function() {
                allSongs = [];
                queue = [];
                localStorage.setItem('melodify_liked', JSON.stringify([]));
                localStorage.setItem('melodify_history', JSON.stringify([]));
                
                const saved = await saveSongsToGitHub();
                
                closeConfirmDialog();
                
                if (saved) {
                    showToast('🗑️ បានលុបបទទាំងអស់ដោយជោគជ័យ');
                    audio.pause();
                    audio.src = '';
                    currentSongIndex = -1;
                    document.getElementById('nowPlayingBar').style.display = 'none';
                    renderAll();
                    renderAdminSongList();
                } else {
                    showToast('❌ មិនអាចលុបបទបាន', 'error');
                }
                
                document.getElementById('confirmDeleteBtn').onclick = originalConfirm;
            };
        }

        // ==================== ADMIN MODE (Quick Delete from Main UI) ====================
        function toggleAdminMode() {
            if (!isAdminLoggedIn) {
                showToast('❌ សូមចូល Admin ជាមុន', 'error');
                return;
            }
            isAdminMode = !isAdminMode;
            updateAdminModeButton();
            renderSongs();
            showToast(isAdminMode ? '👑 Admin Mode បើក - អាចលុបបទបាន' : '👑 Admin Mode បិទ');
        }

        function updateAdminModeButton() {
            const btn = document.getElementById('adminModeToggle');
            btn.style.display = isAdminLoggedIn ? 'flex' : 'none';
            btn.style.background = isAdminMode ? 'var(--accent-red)' : 'var(--bg-tertiary)';
            btn.style.color = isAdminMode ? 'white' : 'var(--text-primary)';
        }

        // ==================== ADMIN PANEL ====================
        function openAdmin() {
            document.getElementById('adminOverlay').classList.add('active');
            document.getElementById('adminPanel').classList.add('active');
            if (isAdminLoggedIn) {
                document.getElementById('adminContent').style.display = 'block';
                renderAdminSongList();
            }
        }

        function closeAdmin() {
            if (document.getElementById('confirmDialog').classList.contains('active')) {
                return;
            }
            document.getElementById('adminOverlay').classList.remove('active');
            document.getElementById('adminPanel').classList.remove('active');
        }

        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === '151515') {
                isAdminLoggedIn = true;
                localStorage.setItem('melodify_admin_logged_in', 'true');
                document.getElementById('adminContent').style.display = 'block';

                // Save GitHub config
                githubConfig.token = document.getElementById('githubToken').value;
                githubConfig.username = document.getElementById('githubUsername').value;
                githubConfig.repo = document.getElementById('githubRepo').value;
                localStorage.setItem('melodify_github_config', JSON.stringify(githubConfig));

                updateAdminModeButton();
                renderAdminSongList();
                showToast('✅ ចូល Admin បានសម្រេច');
            } else {
                showToast('❌ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ', 'error');
            }
        }

        function renderAdminSongList(filterTerm = '') {
            const listEl = document.getElementById('adminSongList');
            let songs = [...allSongs];
            
            if (filterTerm) {
                const term = filterTerm.toLowerCase();
                songs = songs.filter(s => 
                    (s.title || '').toLowerCase().includes(term) || 
                    (s.artist || '').toLowerCase().includes(term)
                );
            }
            
            document.getElementById('adminTotalSongs').textContent = songs.length;
            
            if (songs.length === 0) {
                listEl.innerHTML = '<div style="color: var(--text-secondary); font-size: 13px; text-align:center; padding:20px;">គ្មានបទចម្រៀង</div>';
                return;
            }
            
            listEl.innerHTML = songs.map(song => {
                const songId = song.id || song.title;
                return `
                    <div class="admin-song-item">
                        <div class="admin-song-info">
                            <div class="admin-song-title">${escapeHtml(song.title || 'Unknown')}</div>
                            <div class="admin-song-artist">${escapeHtml(song.artist || 'Unknown')} • ${songId}</div>
                        </div>
                        <div class="admin-song-actions">
                            <button class="btn btn-sm btn-secondary" onclick="playSongById('${escapeHtml(songId)}')">▶️ ចាក់</button>
                            <button class="btn btn-sm btn-danger" onclick="requestDeleteSong('${escapeHtml(songId)}')">🗑️ លុប</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterAdminSongs() {
            const term = document.getElementById('adminSearchInput').value;
            renderAdminSongList(term);
        }

        async function addSongManual() {
            if (!isAdminLoggedIn) {
                showToast('❌ សូមចូល Admin ជាមុន', 'error');
                return;
            }

            const title = document.getElementById('newSongTitle').value.trim();
            const artist = document.getElementById('newSongArtist').value.trim();
            const url = document.getElementById('newSongUrl').value.trim();
            const cover = document.getElementById('newSongCover').value.trim();

            if (!title || !artist || !url) {
                showToast('❌ សូមបំពេញគ្រប់ចន្លោះដែលត្រូវការ', 'error');
                return;
            }

            const newSong = {
                id: 'song_' + Date.now(),
                title: title,
                artist: artist,
                url: url,
                cover: cover || '',
                addedAt: new Date().toISOString()
            };

            allSongs.push(newSong);
            addToUploadQueue(newSong, 'pending');

            const saved = await saveSongsToGitHub();
            if (saved) {
                updateUploadQueueStatus(newSong.id, 'success');
                document.getElementById('newSongTitle').value = '';
                document.getElementById('newSongArtist').value = '';
                document.getElementById('newSongUrl').value = '';
                document.getElementById('newSongCover').value = '';
                renderAll();
                renderAdminSongList();
            } else {
                updateUploadQueueStatus(newSong.id, 'error');
            }
        }

        function addToUploadQueue(song, status) {
            const queueEl = document.getElementById('uploadQueue');
            if (queueEl.querySelector('div[style]')) {
                queueEl.innerHTML = '';
            }
            const item = document.createElement('div');
            item.className = 'upload-item';
            item.id = 'upload-' + song.id;
            item.innerHTML = `
                <span>${escapeHtml(song.title)} - ${escapeHtml(song.artist)}</span>
                <span class="status-dot ${status}"></span>
            `;
            queueEl.prepend(item);
        }

        function updateUploadQueueStatus(id, status) {
            const item = document.getElementById('upload-' + id);
            if (item) {
                const dot = item.querySelector('.status-dot');
                dot.className = 'status-dot ' + status;
            }
        }

        function refreshSongs() {
            loadSongs().then(() => {
                renderAll();
                renderAdminSongList();
                showToast('🔄 បានផ្ទុកទិន្នន័យឡើងវិញ');
            });
        }

        // ==================== TOAST ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'error') toast.classList.add('error');
            if (type === 'warning') toast.classList.add('warning');
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', (e) => {
            // Space to play/pause (only when not in input)
            if (e.code === 'Space' && document.activeElement === document.body) {
                e.preventDefault();
                togglePlay();
            }
            // Escape to close modals
            if (e.code === 'Escape') {
                closeFullPlayer();
                closeConfirmDialog();
                closeAdmin();
            }
        });

        // ==================== INIT ====================
        init();
    </script>

</body>
</html>
