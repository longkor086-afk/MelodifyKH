<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify - តន្ត្រីខ្មែរ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --heart: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--accent), #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            flex: 1;
            margin: 0 16px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .admin-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .admin-btn:hover {
            background: var(--accent-hover);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            transition: 0.3s;
            border: none;
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--accent);
        }

        /* Song List */
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            gap: 12px;
        }

        .song-item:hover, .song-item.active {
            background: var(--bg-tertiary);
            transform: scale(1.02);
        }

        .song-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--bg-tertiary);
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-title {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: 0.3s;
        }

        .btn-icon:hover {
            color: var(--text-primary);
        }

        .btn-icon.liked {
            color: var(--heart);
        }

        /* Now Playing Bar */
        .now-playing-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid #333;
            padding: 12px 16px;
            z-index: 200;
        }

        .now-playing-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .np-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
        }

        .np-info {
            flex: 1;
            min-width: 0;
        }

        .np-title {
            font-size: 14px;
            font-weight: 600;
        }

        .np-artist {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .np-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .np-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: 0.3s;
        }

        .np-btn:hover {
            color: var(--accent);
        }

        .np-btn.play-btn {
            font-size: 28px;
        }

        /* Full Player */
        .full-player {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .full-player.show {
            display: flex;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-cover {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1;
            margin: 0 auto;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .player-info {
            text-align: center;
            margin: 20px 0;
        }

        .player-title {
            font-size: 20px;
            font-weight: bold;
        }

        .player-artist {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .progress-container {
            width: 100%;
            margin: 16px 0;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 20px 0;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
            transition: 0.3s;
        }

        .control-btn:hover {
            color: var(--accent);
        }

        .control-btn.play-pause {
            font-size: 40px;
            background: var(--accent);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn.active {
            color: var(--accent);
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 400;
            display: none;
            padding: 20px;
            overflow-y: auto;
        }

        .admin-panel.show {
            display: block;
        }

        .admin-form {
            max-width: 500px;
            margin: 20px auto;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
        }

        .admin-form h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .submit-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            z-index: 500;
            display: none;
        }

        .modal.show {
            display: block;
        }

        .modal input {
            margin: 10px 0;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            width: 100%;
        }

        @media (max-width: 768px) {
            .player-cover {
                max-width: 250px;
            }
            
            .player-controls {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🎵 Melodify</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ស្វែងរកបទចម្រៀង..." oninput="searchSongs()">
            </div>
            <button class="admin-btn" onclick="showAdmin()">⚙️</button>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <button class="tab active" onclick="switchTab('all')">ទាំងអស់</button>
            <button class="tab" onclick="switchTab('albums')">អាល់ប៊ុម</button>
            <button class="tab" onclick="switchTab('artists')">អ្នកចម្រៀង</button>
            <button class="tab" onclick="switchTab('liked')">❤️ ចូលចិត្ត</button>
            <button class="tab" onclick="switchTab('history')">🕐 ប្រវត្តិ</button>
        </div>

        <!-- Song List -->
        <div class="main-content" id="songList">
            <!-- Songs will be loaded here -->
        </div>

        <!-- Now Playing Bar -->
        <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
            <div class="now-playing-content">
                <img class="np-cover" id="npCover" src="" alt="Cover" onclick="openFullPlayer()">
                <div class="np-info" onclick="openFullPlayer()">
                    <div class="np-title" id="npTitle"></div>
                    <div class="np-artist" id="npArtist"></div>
                </div>
                <div class="np-controls">
                    <button class="np-btn" onclick="previousSong()">⏮</button>
                    <button class="np-btn play-btn" id="npPlayPause" onclick="togglePlay()">▶️</button>
                    <button class="np-btn" onclick="nextSong()">⏭</button>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <!-- Full Player -->
        <div class="full-player" id="fullPlayer">
            <div class="player-header">
                <button class="control-btn" onclick="closeFullPlayer()">▼</button>
                <div></div>
                <button class="control-btn" onclick="shareCurrentSong()">📤</button>
            </div>
            <img class="player-cover" id="playerCover" src="" alt="Cover">
            <div class="player-info">
                <div class="player-title" id="playerTitle"></div>
                <div class="player-artist" id="playerArtist"></div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="playerProgressBar" onclick="playerSeek(event)">
                    <div class="progress-fill" id="playerProgressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
                <button class="control-btn" onclick="previousSong()">⏮</button>
                <button class="control-btn play-pause" id="playerPlayPause" onclick="togglePlay()">▶️</button>
                <button class="control-btn" onclick="nextSong()">⏭</button>
                <button class="control-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
            </div>
            <div style="display: flex; justify-content: center; gap: 16px; margin-top: 20px;">
                <button class="control-btn" onclick="downloadCurrentSong()">⬇️ ទាញយក</button>
                <button class="control-btn" id="likeBtn" onclick="toggleLike()">🤍</button>
            </div>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-form">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Admin Panel</h2>
                    <button class="btn-icon" onclick="closeAdmin()" style="font-size: 24px;">✕</button>
                </div>
                
                <h3>បញ្ចូលបទថ្មី</h3>
                <div class="form-group">
                    <label>ឈ្មោះបទ</label>
                    <input type="text" id="songTitle" placeholder="ឈ្មោះបទចម្រៀង">
                </div>
                <div class="form-group">
                    <label>អ្នកចម្រៀង</label>
                    <input type="text" id="songArtist" placeholder="ឈ្មោះអ្នកចម្រៀង">
                </div>
                <div class="form-group">
                    <label>អាល់ប៊ុម</label>
                    <input type="text" id="songAlbum" placeholder="ឈ្មោះអាល់ប៊ុម">
                </div>
                <div class="form-group">
                    <label>តំណ MP3</label>
                    <input type="url" id="songUrl" placeholder="https://example.com/song.mp3">
                </div>
                <div class="form-group">
                    <label>តំណរូបភាព</label>
                    <input type="url" id="songCover" placeholder="https://example.com/cover.jpg">
                </div>
                <button class="submit-btn" onclick="addSong()">បញ្ចូលបទចម្រៀង</button>
                
                <h3 style="margin-top: 30px;">បញ្ជីចម្រៀងទាំងអស់</h3>
                <div id="adminSongList" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        // Global variables
        let songs = [];
        let currentSongIndex = -1;
        let isPlaying = false;
        let isShuffled = false;
        let repeatMode = 'off'; // off, all, one
        let currentTab = 'all';
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs') || '[]');
        let historySongs = JSON.parse(localStorage.getItem('historySongs') || '[]');
        let playlist = [];

        const audioPlayer = document.getElementById('audioPlayer');
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/longkor086-afk/MelodifyKH/main/';

        // Load songs from GitHub
        async function loadSongs() {
            try {
                const response = await fetch(GITHUB_RAW_URL + 'songs.json');
                songs = await response.json();
                updatePlaylist();
                renderSongs();
                updateAdminSongList();
            } catch (error) {
                console.error('Error loading songs:', error);
                // Fallback: try local storage
                const localSongs = localStorage.getItem('songs');
                if (localSongs) {
                    songs = JSON.parse(localSongs);
                    updatePlaylist();
                    renderSongs();
                }
            }
        }

        function updatePlaylist() {
            switch(currentTab) {
                case 'all':
                    playlist = [...songs];
                    break;
                case 'liked':
                    playlist = songs.filter(song => likedSongs.includes(song.id));
                    break;
                case 'history':
                    playlist = historySongs.map(id => songs.find(s => s.id === id)).filter(Boolean);
                    break;
                case 'albums':
                    playlist = [...songs]; // You can add album filtering logic
                    break;
                case 'artists':
                    playlist = [...songs]; // You can add artist filtering logic
                    break;
                default:
                    playlist = [...songs];
            }
            
            if (isShuffled) {
                shuffleArray(playlist);
            }
        }

        function renderSongs() {
            const songList = document.getElementById('songList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredSongs = playlist.filter(song => 
                song.title.toLowerCase().includes(searchTerm) ||
                song.artist.toLowerCase().includes(searchTerm) ||
                (song.album && song.album.toLowerCase().includes(searchTerm))
            );

            if (filteredSongs.length === 0) {
                songList.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">រកមិនឃើញបទចម្រៀងទេ 🎵</div>';
                return;
            }

            songList.innerHTML = filteredSongs.map((song, index) => `
                <div class="song-item ${currentSongIndex === songs.indexOf(song) ? 'active' : ''}" onclick="playSong(${songs.indexOf(song)})">
                    <img class="song-cover" src="${song.cover || 'https://via.placeholder.com/48'}" alt="${song.title}" onerror="this.src='https://via.placeholder.com/48'">
                    <div class="song-info">
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist}${song.album ? ' • ' + song.album : ''}</div>
                    </div>
                    <div class="song-actions">
                        <button class="btn-icon ${likedSongs.includes(song.id) ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLikeSong(${songs.indexOf(song)})">
                            ${likedSongs.includes(song.id) ? '❤️' : '🤍'}
                        </button>
                        <button class="btn-icon" onclick="event.stopPropagation(); shareSong(${songs.indexOf(song)})">📤</button>
                    </div>
                </div>
            `).join('');
        }

        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            
            currentSongIndex = index;
            const song = songs[index];
            
            // Add to history
            if (!historySongs.includes(song.id)) {
                historySongs.unshift(song.id);
                if (historySongs.length > 50) historySongs.pop();
                localStorage.setItem('historySongs', JSON.stringify(historySongs));
            }
            
            // Load audio
            audioPlayer.src = song.url;
            audioPlayer.load();
            audioPlayer.play().then(() => {
                isPlaying = true;
                updatePlayPauseButtons();
            }).catch(error => {
                console.error('Playback failed:', error);
                alert('មិនអាចចាក់បទចម្រៀងនេះបានទេ។ សូមពិនិត្យមើលតំណ MP3 ។');
            });
            
            updateNowPlaying();
            updateFullPlayer();
            renderSongs();
            showNowPlayingBar();
        }

        function togglePlay() {
            if (currentSongIndex === -1) {
                if (songs.length > 0) {
                    playSong(0);
                }
                return;
            }
            
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                audioPlayer.play();
                isPlaying = true;
            }
            updatePlayPauseButtons();
        }

        function nextSong() {
            if (songs.length === 0) return;
            
            let nextIndex;
            if (isShuffled) {
                nextIndex = Math.floor(Math.random() * songs.length);
            } else {
                nextIndex = currentSongIndex + 1;
                if (nextIndex >= songs.length) {
                    if (repeatMode === 'all') {
                        nextIndex = 0;
                    } else {
                        return;
                    }
                }
            }
            playSong(nextIndex);
        }

        function previousSong() {
            if (songs.length === 0 || currentSongIndex === -1) return;
            
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }
            
            let prevIndex = currentSongIndex - 1;
            if (prevIndex < 0) {
                if (repeatMode === 'all') {
                    prevIndex = songs.length - 1;
                } else {
                    return;
                }
            }
            playSong(prevIndex);
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            document.getElementById('shuffleBtn').classList.toggle('active', isShuffled);
            updatePlaylist();
            renderSongs();
        }

        function toggleRepeat() {
            const modes = ['off', 'all', 'one'];
            const currentIndex = modes.indexOf(repeatMode);
            repeatMode = modes[(currentIndex + 1) % modes.length];
            
            const repeatBtn = document.getElementById('repeatBtn');
            repeatBtn.textContent = repeatMode === 'one' ? '🔂' : '🔁';
            repeatBtn.classList.toggle('active', repeatMode !== 'off');
        }

        function updatePlayPauseButtons() {
            const playIcon = isPlaying ? '⏸️' : '▶️';
            document.getElementById('npPlayPause').textContent = playIcon;
            document.getElementById('playerPlayPause').textContent = playIcon;
        }

        function updateNowPlaying() {
            if (currentSongIndex === -1) return;
            const song = songs[currentSongIndex];
            document.getElementById('npCover').src = song.cover || 'https://via.placeholder.com/48';
            document.getElementById('npTitle').textContent = song.title;
            document.getElementById('npArtist').textContent = song.artist;
        }

        function updateFullPlayer() {
            if (currentSongIndex === -1) return;
            const song = songs[currentSongIndex];
            document.getElementById('playerCover').src = song.cover || 'https://via.placeholder.com/300';
            document.getElementById('playerTitle').textContent = song.title;
            document.getElementById('playerArtist').textContent = song.artist;
            updateLikeButton();
        }

        function updateLikeButton() {
            if (currentSongIndex === -1) return;
            const song = songs[currentSongIndex];
            const likeBtn = document.getElementById('likeBtn');
            if (likedSongs.includes(song.id)) {
                likeBtn.textContent = '❤️';
                likeBtn.style.color = '#e74c3c';
            } else {
                likeBtn.textContent = '🤍';
                likeBtn.style.color = '';
            }
        }

        function toggleLike() {
            if (currentSongIndex === -1) return;
            toggleLikeSong(currentSongIndex);
        }

        function toggleLikeSong(index) {
            const song = songs[index];
            const likeIndex = likedSongs.indexOf(song.id);
            
            if (likeIndex > -1) {
                likedSongs.splice(likeIndex, 1);
            } else {
                likedSongs.push(song.id);
            }
            
            localStorage.setItem('likedSongs', JSON.stringify(likedSongs));
            updateLikeButton();
            renderSongs();
        }

        function showNowPlayingBar() {
            document.getElementById('nowPlayingBar').style.display = 'block';
        }

        function openFullPlayer() {
            document.getElementById('fullPlayer').classList.add('show');
            updateFullPlayer();
        }

        function closeFullPlayer() {
            document.getElementById('fullPlayer').classList.remove('show');
        }

        function seek(event) {
            const progressBar = document.getElementById('progressBar');
            const rect = progressBar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        function playerSeek(event) {
            const progressBar = document.getElementById('playerProgressBar');
            const rect = progressBar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            updatePlaylist();
            renderSongs();
        }

        function searchSongs() {
            updatePlaylist();
            renderSongs();
        }

        function showAdmin() {
            const password = prompt('បញ្ចូលពាក្យសម្ងាត់ Admin:');
            if (password === 'admin123') {
                document.getElementById('adminPanel').classList.add('show');
            } else if (password !== null) {
                alert('ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!');
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function addSong() {
            const title = document.getElementById('songTitle').value.trim();
            const artist = document.getElementById('songArtist').value.trim();
            const album = document.getElementById('songAlbum').value.trim();
            const url = document.getElementById('songUrl').value.trim();
            const cover = document.getElementById('songCover').value.trim();

            if (!title || !artist || !url) {
                alert('សូមបំពេញព័ត៌មានចាំបាច់ទាំងអស់!');
                return;
            }

            const newSong = {
                id: Date.now().toString(),
                title,
                artist,
                album: album || 'Unknown',
                url,
                cover: cover || 'https://via.placeholder.com/300',
                addedDate: new Date().toISOString()
            };

            songs.push(newSong);
            saveSongs();
            updatePlaylist();
            renderSongs();
            updateAdminSongList();

            // Clear form
            document.getElementById('songTitle').value = '';
            document.getElementById('songArtist').value = '';
            document.getElementById('songAlbum').value = '';
            document.getElementById('songUrl').value = '';
            document.getElementById('songCover').value = '';

            alert('បានបញ្ចូលបទចម្រៀងដោយជោគជ័យ! ✅');
        }

        function deleteSong(index) {
            if (confirm('តើអ្នកចង់លុបបទចម្រៀងនេះមែនទេ?')) {
                songs.splice(index, 1);
                saveSongs();
                updatePlaylist();
                renderSongs();
                updateAdminSongList();
                
                if (currentSongIndex === index) {
                    audioPlayer.pause();
                    isPlaying = false;
                    currentSongIndex = -1;
                }
            }
        }

        function saveSongs() {
            // Save to localStorage as backup
            localStorage.setItem('songs', JSON.stringify(songs));
            
            // You need to update songs.json on GitHub manually or via GitHub API
            // For now, songs will be stored in localStorage
        }

        function updateAdminSongList() {
            const adminSongList = document.getElementById('adminSongList');
            if (songs.length === 0) {
                adminSongList.innerHTML = '<div style="color: var(--text-secondary); padding: 20px;">មិនទាន់មានបទចម្រៀងទេ</div>';
                return;
            }
            
            adminSongList.innerHTML = songs.map((song, index) => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333;">
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 14px;">${song.title}</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">${song.artist}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteSong(${index})">លុប</button>
                </div>
            `).join('');
        }

        function downloadCurrentSong() {
            if (currentSongIndex === -1) return;
            const song = songs[currentSongIndex];
            const link = document.createElement('a');
            link.href = song.url;
            link.download = `${song.title} - ${song.artist}.mp3`;
            link.click();
        }

        function shareCurrentSong() {
            if (currentSongIndex === -1) return;
            shareSong(currentSongIndex);
        }

        function shareSong(index) {
            const song = songs[index];
            const shareData = {
                title: song.title,
                text: `ស្តាប់បទ ${song.title} ដោយ ${song.artist} នៅលើ Melodify! 🎵`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(console.error);
            } else {
                // Fallback: copy to clipboard
                const textToCopy = `${shareData.text}\n${shareData.url}`;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    alert('បានចម្លងតំណចែករំលែក! 📋');
                }).catch(() => {
                    prompt('ចម្លងតំណនេះ៖', shareData.url);
                });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Audio player events
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('playerProgressFill').style.width = progress + '%';
                
                document.getElementById('currentTime').textContent = formatTime(audioPlayer.currentTime);
                document.getElementById('duration').textContent = formatTime(audioPlayer.duration);
            }
        });

        audioPlayer.addEventListener('ended', () => {
            if (repeatMode === 'one') {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else {
                nextSong();
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            document.getElementById('duration').textContent = formatTime(audioPlayer.duration);
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Prevent screen lock (keep audio playing when screen is off)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => togglePlay());
            navigator.mediaSession.setActionHandler('pause', () => togglePlay());
            navigator.mediaSession.setActionHandler('previoustrack', () => previousSong());
            navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
        }

        // Initialize
        loadSongs();
    </script>
</body>
</html>
