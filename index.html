<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MelodifyKH</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      🎵 <span>MelodifyKH</span>
    </div>

    <input
      type="text"
      id="searchInput"
      placeholder="ស្វែងរកបទចម្រៀង..."
      class="search-box"
    >
  </header>

  <!-- Song Grid -->
  <main>
    <div id="songGrid" class="song-grid"></div>

    <!-- Pagination -->
    <div id="pagination" class="pagination"></div>
  </main>

  <!-- Mini Player -->
  <div id="miniPlayer" class="mini-player hidden">

    <div class="player-info">
      <div id="playerCover" class="player-cover"></div>

      <div class="player-text">
        <div id="playerTitle">Unknown Song</div>
        <div id="playerArtist">Unknown Artist</div>
      </div>
    </div>

    <div class="player-controls">
      <button onclick="prevSong()">⏮️</button>
      <button id="playBtn" onclick="togglePlay()">▶️</button>
      <button onclick="nextSong()">⏭️</button>
    </div>

  </div>

  <!-- Full Player Modal -->
  <div id="playerModal" class="modal hidden">

    <div class="modal-content">

      <button class="close-btn" onclick="closePlayer()">
        ✕
      </button>

      <div id="modalCover" class="modal-cover"></div>

      <h2 id="modalTitle">
        Unknown Song
      </h2>

      <p id="modalArtist">
        Unknown Artist
      </p>

      <audio id="audio" preload="auto"></audio>

      <input
        type="range"
        id="progressBar"
        value="0"
      >

      <div class="modal-controls">

        <button onclick="toggleShuffle()">
          🔀
        </button>

        <button onclick="prevSong()">
          ⏮️
        </button>

        <button onclick="togglePlay()">
          ▶️
        </button>

        <button onclick="nextSong()">
          ⏭️
        </button>

        <button onclick="toggleRepeat()">
          🔁
        </button>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
