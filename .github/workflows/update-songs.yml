name: Update Songs JSON
on:
  push:
    paths:
      - 'songs/**'
      - 'covers/**'
  workflow_dispatch:  # អនុញ្ញាតឱ្យដំណើរការដោយដៃ

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate songs.json
        run: |
          # ពិនិត្យថាមានឯកសារ songs.json ដែរឬទេ
          if [ ! -f songs.json ]; then
            echo '[]' > songs.json
          fi
          
          echo "✅ songs.json បានត្រៀមរួចរាល់"
      
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add songs.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-update songs.json"
          git push
